name: Build macOS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build
        working-directory: macos
        run: swift build -c release

      - name: Run Tests
        working-directory: macos
        run: swift test

      - name: Package
        working-directory: macos
        run: |
          mkdir -p dist/TermiusRPC.app/Contents/MacOS
          mkdir -p dist/TermiusRPC.app/Contents/Resources
          cp .build/release/TermiusRPC dist/TermiusRPC.app/Contents/MacOS/
          cp TermiusRPC/TermiusRPC/Info.plist dist/TermiusRPC.app/Contents/
          cd dist && zip -r TermiusRPC-macOS.zip TermiusRPC.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TermiusRPC-macOS
          path: macos/dist/TermiusRPC-macOS.zip

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: macos/dist/TermiusRPC-macOS.zip
